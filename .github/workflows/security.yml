name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit (full report)
        run: bandit -r antigence_subnet/ neurons/ scripts/ -f json -o bandit-results.json --exit-zero

      - name: Run bandit (fail on medium+ severity)
        run: |
          bandit -r antigence_subnet/ neurons/ scripts/ -ll \
            --skip B104,B310,B608,B614
          # Skipped rules (all verified false positives in this codebase):
          # B104: bind 0.0.0.0 — local benchmark/validator harnesses
          # B310: urlopen — local Ollama endpoints, not user-controlled input
          # B608: SQL expressions — parameterized evaluation queries, no user input
          # B614: torch.load — models loaded with weights_only=True
          # Full report (all rules) in bandit-results.json step above

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: google/osv-scanner-action/osv-scanner-action@98b584ee2ed2da3935ccce10e06739d54cdcd20b  # v2.0.0
        continue-on-error: true  # Advisory — upstream deps (py, setuptools) have known CVEs we can't fix
        with:
          scan-args: --lockfile=requirements-lock.txt
