# Antigence Subnet - Minimum Compute Requirements
# Follows official Bittensor subnet template format.
#
# Miners:
#   Minimum (CPU-only): Sufficient for IsolationForest reference detector.
#   Recommended (GPU): Adds CUDA GPU for autoencoder detector (PyTorch).
#
# Validators:
#   No GPU required. Validators run evaluation scoring and weight setting.
#
# Network:
#   Miner Axon server must be reachable on its configured port (default 8091).
#   Stable internet required for Dendrite/Axon HTTP communication.

version: '1.0'

compute_spec:
  miner:
    cpu:
      min_cores: 4
      min_speed: 2.5
      recommended_cores: 8
      recommended_speed: 3.0
      architecture: "x86_64"
    gpu:
      required: false
      min_vram: 0
      recommended_vram: 4
      cuda_cores: 0
      min_compute_capability: 0.0
      recommended_compute_capability: 6.0
      recommended_gpu: "NVIDIA GTX 1650 or better"
    memory:
      min_ram: 8
      min_swap: 2
      recommended_swap: 4
      ram_type: "DDR4"
    storage:
      min_space: 20
      recommended_space: 50
      type: "SSD"
      min_iops: 1000
      recommended_iops: 5000
    os:
      name: "Ubuntu"
      version: 22.04

  validator:
    cpu:
      min_cores: 4
      min_speed: 2.5
      recommended_cores: 8
      recommended_speed: 3.0
      architecture: "x86_64"
    gpu:
      required: false
      min_vram: 0
      recommended_vram: 0
      cuda_cores: 0
      min_compute_capability: 0.0
      recommended_compute_capability: 0.0
      recommended_gpu: "Not required"
    memory:
      min_ram: 8
      min_swap: 2
      recommended_swap: 4
      ram_type: "DDR4"
    storage:
      min_space: 20
      recommended_space: 50
      type: "SSD"
      min_iops: 1000
      recommended_iops: 5000
    os:
      name: "Ubuntu"
      version: 22.04

network_spec:
  bandwidth:
    download: 100
    upload: 20
